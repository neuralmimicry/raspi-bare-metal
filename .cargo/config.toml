[build]
# Set our default target
target = "aarch64-unknown-none"

[unstable]
# Ensure `core` and `compiler_builtins` are built for our bare-metal target (used by CLI and IDE)
build-std = ["core", "compiler_builtins"]

[target.aarch64-unknown-none]
# Tell rustc to use our linker script
rustflags = ["-C", "link-arg=-Traspi.ld"]
